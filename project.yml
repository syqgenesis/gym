name: Gym
options:
  bundleIdPrefix: com.gym
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  configFiles:
    Debug: Config/Config.xcconfig
    Release: Config/Config.xcconfig
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  Gym:
    type: application
    platform: iOS
    sources:
      - path: Gym
        excludes:
          - "**/*.xcassets"
    resources:
      - path: Gym/Resources/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gym.app
        INFOPLIST_FILE: Gym/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Supabase
        product: Supabase
